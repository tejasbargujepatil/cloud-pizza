name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Username Secret
        run: |
          echo "Checking DOCKER_USERNAME secret..."
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "ERROR: DOCKER_USERNAME is empty!"
            exit 1
          fi
          echo "DOCKER_USERNAME is configured."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t cloud-pizza:latest .

      - name: Tag Docker Image
        run: |
          docker tag cloud-pizza:latest ${{ secrets.DOCKER_USERNAME }}/cloud-pizza:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-pizza:latest
